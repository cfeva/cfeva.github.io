        { cat:"解析几何", name:"椭圆通径", latex: "\\frac{2b^2}{a}" },
        { cat:"解析几何", name:"双曲线定义", latex: "||PF_1|-|PF_2||=2a\\ (2a<|F_1F_2|)" },
        { cat:"解析几何", name:"双曲线标准方程", latex: "\\frac{x^2}{a^2}-\\frac{y^2}{b^2}=1" },
        { cat:"解析几何", name:"双曲线离心率", latex: "e=\\frac{c}{a}=\\sqrt{1+\\frac{b^2}{a^2}}>1" },
        { cat:"解析几何", name:"双曲线渐近线", latex: "y=\\pm\\frac{b}{a}x" },
        { cat:"解析几何", name:"抛物线定义", latex: "|PF|=d\\ (\\text{到准线})" },
        { cat:"解析几何", name:"抛物线标准方程", latex: "y^2=2px\\ (p>0)" },
        { cat:"解析几何", name:"抛物线焦半径", latex: "|MF|=x_0+\\frac{p}{2}" },
        { cat:"解析几何", name:"抛物线焦点弦长", latex: "l=x_1+x_2+p=\\frac{2p}{\\sin^2\\alpha}" },
        { cat:"解析几何", name:"抛物线焦点弦性质", latex: "\\frac{1}{|AF|}+\\frac{1}{|BF|}=\\frac{2}{p}" },
        { cat:"解析几何", name:"点差法斜率(椭圆)", latex: "k=-\\frac{b^2x_0}{a^2y_0}" },
        { cat:"解析几何", name:"点差法斜率(双曲线)", latex: "k=\\frac{b^2x_0}{a^2y_0}" },
        { cat:"解析几何", name:"点差法斜率(抛物线)", latex: "k=\\frac{p}{y_0}" },
        { cat:"解析几何", name:"切线方程(椭圆)", latex: "\\frac{x_0x}{a^2}+\\frac{y_0y}{b^2}=1" },
        { cat:"解析几何", name:"切线方程(抛物线)", latex: "y_0y=p(x_0+x)" },
        { cat:"解析几何", name:"焦点三角形面积(椭圆)", latex: "S=b^2\\tan\\frac{\\theta}{2}" },
        { cat:"解析几何", name:"焦点三角形面积(双曲线)", latex: "S=b^2\\cot\\frac{\\theta}{2}" },
        // ----- 概率统计 -----
        { cat:"概率统计", name:"简单随机抽样", latex: "\\text{抽签法、随机数表法}" },
        { cat:"概率统计", name:"系统抽样", latex: "a_i=a+\\frac{i(n-1)}{n}" },
        { cat:"概率统计", name:"分层抽样", latex: "\\frac{n}{N}=\\frac{n_1}{N_1}=\\frac{n_2}{N_2}" },
        { cat:"概率统计", name:"频率分布直方图", latex: "\\text{频率}= \\text{小矩形面积},\\ \\text{众数}= \\text{最高矩形中点},\\ \\text{中位数}= \\text{面积0.5对应x}" },
        { cat:"概率统计", name:"平均数公式", latex: "\\bar{x}=x_1f_1+x_2f_2+\\cdots+x_nf_n" },
        { cat:"概率统计", name:"方差公式", latex: "s^2=\\sum (x_i-\\bar{x})^2 f_i" },
        { cat:"概率统计", name:"线性回归方程", latex: "\\hat{y}=\\hat{b}x+\\hat{a},\\ \\hat{b}=\\frac{\\sum(x_i-\\bar{x})(y_i-\\bar{y})}{\\sum(x_i-\\bar{x})^2},\\ \\hat{a}=\\bar{y}-\\hat{b}\\bar{x}" },
        { cat:"概率统计", name:"相关系数r", latex: "r=\\frac{\\sum(x_i-\\bar{x})(y_i-\\bar{y})}{\\sqrt{\\sum(x_i-\\bar{x})^2\\sum(y_i-\\bar{y})^2}}" },
        { cat:"概率统计", name:"残差", latex: "\\hat{e}_i=y_i-\\hat{y}_i,\\ \\text{残差平方和}=\\sum (y_i-\\hat{y}_i)^2" },
        { cat:"概率统计", name:"拟合度R²", latex: "R^2=1-\\frac{\\sum (y_i-\\hat{y}_i)^2}{\\sum (y_i-\\bar{y})^2}" },
        { cat:"概率统计", name:"独立性检验K²", latex: "K^2=\\frac{n(ad-bc)^2}{(a+b)(c+d)(a+c)(b+d)}" },
        { cat:"概率统计", name:"古典概型", latex: "P(A)=\\frac{n_A}{n_\\Omega}" },
        { cat:"概率统计", name:"几何概型", latex: "P(A)=\\frac{\\text{度量}_A}{\\text{度量}_\\Omega}" },
        { cat:"概率统计", name:"互斥事件概率", latex: "P(A+B)=P(A)+P(B)" },
        { cat:"概率统计", name:"对立事件概率", latex: "P(\\overline{A})=1-P(A)" },
        { cat:"概率统计", name:"条件概率", latex: "P(B|A)=\\frac{P(AB)}{P(A)}" },
        { cat:"概率统计", name:"独立事件", latex: "P(AB)=P(A)P(B)" },
        { cat:"概率统计", name:"超几何分布均值", latex: "E(X)=n\\frac{M}{N}" },
        { cat:"概率统计", name:"二项分布均值", latex: "E(X)=np" },
        { cat:"概率统计", name:"二项分布方差", latex: "D(X)=np(1-p)" },
        { cat:"概率统计", name:"正态分布性质", latex: "X\\sim N(\\mu,\\sigma^2),\\ \\text{图像关于}x=\\mu\\text{对称}" },
        { cat:"概率统计", name:"3σ区间概率", latex: "P(\\mu-\\sigma<X<\\mu+\\sigma)\\approx0.6827,\\ P(\\mu-2\\sigma<X<\\mu+2\\sigma)\\approx0.9545,\\ P(\\mu-3\\sigma<X<\\mu+3\\sigma)\\approx0.9973" },
        // ----- 复数 -----
        { cat:"复数", name:"复数模", latex: "|z|=\\sqrt{a^2+b^2}" },
        { cat:"复数", name:"共轭复数", latex: "\\overline{a+bi}=a-bi" },
        { cat:"复数", name:"复数除法", latex: "\\frac{a+bi}{c+di}=\\frac{(a+bi)(c-di)}{c^2+d^2}" },
        // ----- 极坐标与参数方程 -----
        { cat:"极参方程", name:"极直互化", latex: "\\rho^2=x^2+y^2,\\ \\tan\\theta=\\frac{y}{x},\\ x=\\rho\\cos\\theta,\\ y=\\rho\\sin\\theta" },
        { cat:"极参方程", name:"直线参数方程", latex: "\\begin{cases} x=x_0+t\\cos\\alpha \\\\ y=y_0+t\\sin\\alpha \\end{cases}\\ (t\\text{为参数})" },
        { cat:"极参方程", name:"圆的参数方程", latex: "\\begin{cases} x=a+r\\cos\\theta \\\\ y=b+r\\sin\\theta \\end{cases}" },
        { cat:"极参方程", name:"椭圆的参数方程", latex: "\\begin{cases} x=a\\cos\\theta \\\\ y=b\\sin\\theta \\end{cases}" },
        { cat:"极参方程", name:"直线参数t几何意义", latex: "|PA|=|t_1|,\\ |AB|=|t_1-t_2|" },
        // ----- 排列组合与二项式定理 -----
        { cat:"排列组合", name:"排列数公式", latex: "A_n^m=n(n-1)\\cdots(n-m+1)" },
        { cat:"排列组合", name:"组合数公式", latex: "C_n^m=\\frac{n!}{m!(n-m)!}" },
        { cat:"排列组合", name:"组合数性质", latex: "C_n^m=C_n^{n-m},\\ C_n^0+C_n^1+\\cdots+C_n^n=2^n" },
        { cat:"排列组合", name:"二项式定理", latex: "(a+b)^n=\\sum_{k=0}^n C_n^k a^{n-k}b^k" },
        { cat:"排列组合", name:"二项式系数和", latex: "\\sum_{k=0}^n C_n^k=2^n" },
        { cat:"排列组合", name:"奇数项系数和", latex: "C_n^0+C_n^2+C_n^4+\\cdots=2^{n-1}" },
        { cat:"排列组合", name:"偶数项系数和", latex: "C_n^1+C_n^3+C_n^5+\\cdots=2^{n-1}" },
        { cat:"排列组合", name:"排列组合顺口溜", latex: "\\text{特殊元素先考虑，相邻问题捆绑法，相隔问题插空法，平均分组除阶乘}" }
    ];

    let currentFilter = "";
    function render() {
        const container = document.getElementById('formulaContainer');
        let filtered = formulas;
        if (currentFilter.trim()) {
            const kw = currentFilter.trim().toLowerCase();
            filtered = formulas.filter(f => f.name.toLowerCase().includes(kw) || f.latex.toLowerCase().includes(kw) || f.cat.toLowerCase().includes(kw));
        }
        const groups = {};
        filtered.forEach(f => { if (!groups[f.cat]) groups[f.cat] = []; groups[f.cat].push(f); });
        let html = '';
        const order = ["集合与逻辑","不等式","函数与导数","积分","三角函数","数列","平面向量","立体几何","解析几何","概率统计","复数","极参方程","排列组合"];
        for (let cat of order) {
            if (groups[cat]) {
                html += `<div class="category-section"><div class="category-title">📌 ${cat}</div><div class="formula-grid">`;
                groups[cat].forEach(f => {
                    let rendered = '';
                    try { const span = document.createElement('span'); katex.render(f.latex, span, { throwOnError: false }); rendered = span.innerHTML; } catch(e) { rendered = f.latex; }
                    html += `<div class="card"><div class="formula-name">${f.name}</div><div class="formula-content">${rendered}</div><button class="copy-btn" data-latex="${f.latex.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;')}">📋 复制</button></div>`;
                });
                html += `</div></div>`;
            }
        }
        if (filtered.length === 0) html = '<div style="text-align:center; padding:2rem;">😢 没有找到相关公式，试试其他关键词</div>';
        container.innerHTML = html;
        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                navigator.clipboard.writeText(btn.getAttribute('data-latex'));
                const toast = document.getElementById('toast');
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 1500);
            });
        });
    }
    document.getElementById('searchInput').addEventListener('input', e => { currentFilter = e.target.value; render(); });
    render();
</script>
</body>
</html>
